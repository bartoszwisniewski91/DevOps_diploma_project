name: Flask DevOps Pipeline

# Pipeline uruchamia się przy każdym pushu do gałęzi main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-notify:
    
    runs-on: self-hosted

    steps:
      # 1. Pobranie najnowszego kodu z GitHuba na serwer
      - name: Checkout repository code
        uses: actions/checkout@v3

      # 2. Instalacja zależności (jeśli coś doszło w requirements.txt)
      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt --break-system-packages

      # 3. Zatrzymanie starej wersji i uruchomienie nowej
      # Używamy nohup, aby aplikacja działała dalej po zakończeniu sesji GitHub Actions
      - name: Debug and Restart
        run: |
          echo "Aktualna ścieżka: $(pwd)"
          echo "Lista plików w tym folderze:"
          ls -R
          
          # Próba zabicia starych procesów
          sudo pkill -f app.py || true
          
          # Uruchomienie (używamy pełnej ścieżki lub upewniamy się, że plik tu jest)
          # Zakładam, że app.py jest w głównym folderze lub podaj ścieżkę:
          nohup python3 app.py </dev/null > $(pwd)/flask.log 2>&1 &
          
          disown -a
          sleep 5
          
          if [ -f "flask.log" ]; then
            echo "--- LOGI APLIKACJI ---"
            cat flask.log
          else
            echo "BŁĄD: Plik flask.log nie powstał!"
            exit 1
          fi

      # 4. Wysyłka powiadomienia e-mail
      # Pobieramy dane z GitHub Secrets i wstrzykujemy je jako zmienne środowiskowe
      - name: Send Email Notification
        run: python3 send_mail.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      # 5. Opcjonalny test poprawności wdrożenia
      - name: Verify Deployment
        run: |
          curl -s http://localhost:5000/metrics | grep python_info || exit 1
          echo "Wdrożenie zweryfikowane pomyślnie!"