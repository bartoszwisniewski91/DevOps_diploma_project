name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- ETAP 1: Budowanie obrazu Docker ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Logowanie do Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Budowanie i wypchnięcie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

 # --- ETAP 2: Konfiguracja serwera (Zamiast Ansible - dla stabilności) ---
  provision:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Konfiguracja systemowa przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Aktualizacja i instalacja niezbędnych narzędzi
            sudo apt-get update
            sudo apt-get install -y curl ufw python3-minimal
            
            # Konfiguracja Firewalla (UFW)
            sudo ufw allow 22/tcp
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            # Otwarcie portów pod monitoring (Prometheus/Grafana)
            sudo ufw allow 3000/tcp
            sudo ufw allow 9090/tcp
            
            # Włączenie firewalla bez rozłączania SSH
            echo "y" | sudo ufw enable
            
            echo "Konfiguracja systemowa zakończona pomyślnie!"
  # --- ETAP 3: Wdrożenie aplikacji (Deploy) ---
  deploy:
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - name: Wdrożenie przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            # Logowanie na serwerze, by uniknąć timeoutów Registry
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            sudo docker stop my-app || true
            sudo docker rm -f my-app || true
            sudo docker run -d --name my-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            sudo docker image prune -f
            sudo docker logout

  # --- ETAP 4: POWIADOMIENIA ---
  notifications:
    needs: [build, provision, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
     
      - name: Email Notification on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BŁĄD PIEPLINE: ${{ github.repository }}"
          to: twoj-email@example.com
          from: GitHub Actions
          body: "Błąd podczas automatyzacji. Sprawdź logi na GitHub Actions."