name: Flask Docker Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync to Production Folder
        run: |
          rsync -av --delete --exclude='.git' ${{ github.workspace }}/ /home/bartosz/moj-projekt-devops/

      - name: Docker Build and Run
        run: |
          cd /home/bartosz/moj-projekt-devops
          
          # Używamy docker compose bez sudo, bo dodaliśmy użytkownika do grupy
          docker compose build
          
          # Zatrzymujemy stary kontener ręcznie, aby uniknąć blokad
          docker compose down || true
          
          # Startujemy nowy
          docker compose up -d
          
          docker image prune -f

      - name: Verify Docker Container
        run: |
          sleep 5
          docker ps | grep flask_devops_container
          curl -s http://localhost:5000/metrics | grep python_info