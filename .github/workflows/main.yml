name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- ETAP 1: Budowanie obrazu Docker ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Logowanie do Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Budowanie i wypchnięcie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  # --- ETAP 2: Wdrożenie aplikacji (Deploy) ---
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wdrożenie przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Logowanie na serwerze
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pobranie najnowszego obrazu
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            # Restart kontenera (zatrzymanie i usunięcie starego jeśli istnieje)
            sudo docker stop my-app || true
            sudo docker rm -f my-app || true
            
            # Uruchomienie nowej wersji
            sudo docker run -d --name my-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            # Czyszczenie starych obrazów
            sudo docker image prune -f
            sudo docker logout

  # --- ETAP 3: Powiadomienia ---
  notifications:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ needs.deploy.result }}
          SLACK_MESSAGE: "Wdrożenie zakończone ze statusem: ${{ needs.deploy.result }}"
          SLACK_TITLE: "App Deployment Status"