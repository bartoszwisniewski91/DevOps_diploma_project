name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ] # Uruchamia dla każdej gałęzi

jobs:
  # Budowanie i testowanie dla wszystkich gałęzi
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Logowanie do Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Budowanie i wypchnięcie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }}

  # Wdrożenie main
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wdrożenie przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m  
          script: |
            # 1. Logowanie do Docker Hub na serwerze (Kluczowe!)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 2. Pobranie obrazu (teraz jako zalogowany użytkownik - szybciej)
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            # 3. Restart aplikacji
            sudo docker stop my-app || true
            sudo docker rm -f my-app || true
            sudo docker run -d --name my-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            # 4. Sprzątanie
            sudo docker image prune -f
            sudo docker logout
