name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- ETAP 1: Budowanie obrazu Docker ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Logowanie do Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Budowanie i wypchnięcie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  # --- ETAP 2: Konfiguracja serwera (Niezawodny Bash) ---
  provision:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Konfiguracja systemowa przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            sudo apt-get update
            sudo apt-get install -y curl ufw python3-minimal
            
            # Konfiguracja Firewalla
            sudo ufw allow 22/tcp
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw allow 3000/tcp
            sudo ufw allow 9090/tcp
            
            # Włączenie firewalla
            echo "y" | sudo ufw enable
            echo "Konfiguracja systemowa zakończona!"

  # --- ETAP 3: Wdrożenie aplikacji (Deploy) ---
  deploy:
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - name: Wdrożenie przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            sudo docker stop my-app || true
            sudo docker rm -f my-app || true
            sudo docker run -d --name my-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            sudo docker image prune -f
            sudo docker logout

  # --- ETAP 4: POWIADOMIENIA ---
  notifications:
    needs: [build, provision, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ contains(needs.*.result, 'failure') && 'danger' || 'good' }}
          SLACK_MESSAGE: "Pipeline: Build(${{ needs.build.result }}), Provision(${{ needs.provision.result }}), Deploy(${{ needs.deploy.result }})"
          SLACK_TITLE: "Status Projektu DevOps"