name: Flask DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-notify:
    runs-on: self-hosted

    steps:
      # 1. Pobranie najnowszego kodu z GitHuba
      - name: Checkout repository code
        uses: actions/checkout@v3

      # 2. Instalacja zależności + Gunicorn (wymagany do reloadu bez downtime)
      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt gunicorn --break-system-packages

      # 3. Inteligentne przeładowanie aplikacji (Zero Downtime)
      - name: Reload or Start Application
        run: |
          cd flask_app
          
          # 1. Zabijanie procesów bez sudo (jeśli runner ma uprawnienia do swoich procesów)
          # Używamy pkill, który jest mniej inwazyjny niż fuser
          pkill -9 -f gunicorn || true
          
          # Jeśli pkill nie wystarczy, fuser z flagą -n (non-interactive) i -k (kill)
          # Używamy 'sudo -n', co oznacza "non-interactive" - wywali błąd zamiast wisieć
          sudo -n fuser -k 5000/tcp || true
          
          sleep 2
          
          # 2. Start aplikacji
          # Upewnij się, że ścieżka do loga jest absolutna, by uniknąć problemów
          nohup gunicorn --workers 3 --bind 0.0.0.0:5000 app:app </dev/null > $(pwd)/flask.log 2>&1 &
          
          # 3. Odwiązanie procesu
          disown -a
          
          # 4. Szybka weryfikacja
          sleep 3
          pgrep -f gunicorn && echo "Gunicorn wystartował!" || (cat flask.log && exit 1)

      # 4. Diagnostyka i weryfikacja metryk
      - name: Verify Metrics and Logs
        run: |
          cd flask_app
          echo "--- OSTATNIE LOGI ---"
          [ -f flask.log ] && tail -n 10 flask.log || echo "Brak pliku logów"
          
          echo "--- TEST ENDPOINTU /METRICS ---"
          # Próbujemy pobrać metryki. Jeśli serwer nie odpowie, pipeline padnie tutaj.
          curl -s --retry 3 --retry-delay 2 http://localhost:5000/metrics | grep python_info
          echo "Metryki są dostępne, aplikacja działa poprawnie."

      # 5. Powiadomienie e-mail (korzysta z Twoich sekretów)
      - name: Send Email Notification
        run: |
          # Upewnij się, że send_mail.py jest w głównym folderze lub dodaj cd
          python3 send_mail.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      # 6. Finalny status w konsoli Actions
      - name: Status Report
        run: |
          echo "Wdrożenie zakończone sukcesem!"
          echo "Adres: http://192.168.0.108:5000"
          echo "Status: Zielony (Zero Downtime)"