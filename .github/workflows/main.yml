name: Flask Docker Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync to Production Folder
        run: |
          rsync -av --delete --exclude='.git' ${{ github.workspace }}/ /home/bartosz/moj-projekt-devops/

      - name: Docker Build and Run
        run: |
          cd /home/bartosz/moj-projekt-devops
          
          # 1. Zbuduj nowy obraz (jeśli kod się zmienił)
          docker compose build
          
          # 2. Uruchom kontener (Docker sam zatrzyma stary i włączy nowy - Zero Downtime)
          docker compose up -d
          
          # 3. Usuń nieużywane, stare obrazy, żeby nie zajmowały miejsca
          docker image prune -f

      - name: Verify Docker Container
        run: |
          sleep 5
          docker ps | grep flask_devops_container
          curl -s http://localhost:5000/metrics | grep python_info