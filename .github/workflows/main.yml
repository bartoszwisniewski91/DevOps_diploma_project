name: Flask DevOps Pipeline

# Pipeline uruchamia się przy każdym pushu do gałęzi main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-notify:
    
    runs-on: self-hosted

    steps:
      # 1. Pobranie najnowszego kodu z GitHuba na serwer
      - name: Checkout repository code
        uses: actions/checkout@v3

      # 2. Instalacja zależności (jeśli coś doszło w requirements.txt)
      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt --break-system-packages

      # 3. Zatrzymanie starej wersji i uruchomienie nowej
      # Używamy nohup, aby aplikacja działała dalej po zakończeniu sesji GitHub Actions
      - name: Restart Flask Application
        run: |
          # 1. Zabijamy stare procesy (jeśli istnieją)
          sudo pkill -f app.py || true
          
          # 2. Uruchamiamy z pełnym odcięciem strumieni
          # </dev/null - zamyka wejście
          # > flask.log - logi standardowe
          # 2>&1 - błędy do tego samego pliku
          # & - praca w tle
          nohup python3 app.py </dev/null > flask.log 2>&1 &
          
          # 3. Kluczowy krok: disown mówi systemowi, że proces nie należy już do tej sesji
          disown -a
          
          # 4. Krótka pauza, by sprawdzić czy aplikacja nie wywaliła się na starcie
          sleep 5
          
          # 5. Sprawdzamy czy proces żyje (dla pewności w logach Actions)
          ps aux | grep app.py | grep -v grep

      # 4. Wysyłka powiadomienia e-mail
      # Pobieramy dane z GitHub Secrets i wstrzykujemy je jako zmienne środowiskowe
      - name: Send Email Notification
        run: python3 send_mail.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      # 5. Opcjonalny test poprawności wdrożenia
      - name: Verify Deployment
        run: |
          curl -s http://localhost:5000/metrics | grep python_info || exit 1
          echo "Wdrożenie zweryfikowane pomyślnie!"