name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # To może zostać na serwerach GitHub
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  deploy:
    needs: build
    runs-on: self-hosted  # <--- TO MUSI SIĘ ZGADZAĆ Z TWOIM RUNNEREM
    steps:
      - name: Wdrożenie lokalne (Docker)
        run: |
          # Logowanie na Twojej maszynie
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Operacje na kontenerach
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
          sudo docker stop my-app || true
          sudo docker rm -f my-app || true
          sudo docker run -d --name my-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest