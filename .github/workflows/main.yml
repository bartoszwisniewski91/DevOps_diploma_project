name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- ETAP 1: Budowanie obrazu Docker ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Logowanie do Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Budowanie i wypchnięcie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  # --- ETAP 2: Konfiguracja serwera przez ANSIBLE ---
  provision:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Przygotowanie klucza SSH
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Uruchomienie Ansible Playbook
        run: |
          echo "[webservers]" > inventory.ini
          echo "${{ secrets.SERVER_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=private_key.pem" >> inventory.ini
          
          export ANSIBLE_HOST_KEY_CHECKING=False
          
          ansible-playbook -i inventory.ini ansible/setup-server.yml \
          --ssh-common-args='-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o PreferredAuthentications=publickey -o ControlMaster=no'

  # --- ETAP 3: Wdrożenie aplikacji (Deploy) ---
  deploy:
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - name: Wdrożenie przez SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            # Logowanie do Docker Hub na serwerze
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pobranie obrazu jako zalogowany użytkownik (omija limity)
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            # Restart kontenera
            sudo docker stop my-app || true
            sudo docker rm -f my-app || true
            sudo docker run -d --name my-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            
            # Sprzątanie starych obrazów (oszczędność miejsca na dysku 8GB)
            sudo docker image prune -f
            sudo docker logout

  # --- ETAP 4: POWIADOMIENIA ---
  notifications:
    needs: deploy
    runs-on: ubuntu-latest
    if: always() # Wykonaj niezależnie od wyniku poprzednich kroków
    steps:
     
      - name: Email Notification on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "ALARM: Błąd Pipeline w projekcie ${{ github.repository }}"
          to: bartoszwisniewski91@gmail.com
          from: GitHub Actions
          body: "Błąd wdrożenia na AWS. Sprawdź logi: https://github.com/${{ github.repository }}/actions"