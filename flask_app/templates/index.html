<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Project - Flask App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">DevOps System</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4">Witaj w Projektu Dyplomowym!</h1>
                <p class="lead">Aplikacja monitorowana przez Prometheus & Grafana</p>
                <hr>

                {% if user %}
                    <div class="alert alert-success">
                        <h3>Jesteś zalogowany jako: <strong>{{ user }}</strong></h3>
                    </div>
                    <a href="/logout" class="btn btn-danger btn-lg">Wyloguj się</a>
                {% else %}
                    <div class="mt-4">
                        <a href="/login" class="btn btn-primary btn-lg me-2">Zaloguj się</a>
                        <a href="/register" class="btn btn-outline-secondary btn-lg">Stwórz konto</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
